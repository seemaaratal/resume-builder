<!DOCTYPE html>
<html>
<head>
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h1>Resume Builder</h1>

<input type="text" id="name" placeholder="Enter Name"><br>
<input type="email" id="email" placeholder="Enter Email"><br>
<input type="text" id="phone" placeholder="Enter Phone"><br>
<input type="text" id="objective" placeholder="Career Objective"><br>
<input type="text" id="skills" placeholder="Enter Skills"><br>
<input type="text" id="education" placeholder="Enter Education"><br>
<input type="text" id="projects" placeholder="Enter Projects"><br>
<input type="file" id="photo"><br>

<button onclick="generateResume()">Generate Resume</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="resume"></div>

<script src="script.js"></script>
</body>
</html>
